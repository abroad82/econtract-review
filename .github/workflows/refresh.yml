name: Daily refresh — e-contract landing pages

# Captures the live e-contract.com.au landing pages each morning (6am AWST),
# commits the diff, and redeploys the board. All pages are logged-out (no login needed).

on:
  schedule:
    - cron: '0 22 * * *'   # 22:00 UTC = 6:00 AWST
  workflow_dispatch: {}     # run on demand from the Actions tab

permissions:
  contents: write           # so the job can commit the refreshed captures

concurrency:
  group: page-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the board
        uses: actions/checkout@v4

      - name: Capture e-contract landing pages
        shell: pwsh
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $L = "https://e-contract.com.au/"
          $dst = "${{ github.workspace }}/pages-live"
          $pages = @(
            @{f="EC01_home.html"; u=""},
            @{f="EC02_register-employee.html"; u="register-interest-employee"},
            @{f="EC03_register-contractor.html"; u="register-interest"},
            @{f="EC04_register-thanks.html"; u="register-interest-thanks"},
            @{f="EC05_privacy.html"; u="privacy-policy"},
            @{f="EC06_find-contractor-hub.html"; u="search/find_me_worker"},
            @{f="EC07_find-employee-hub.html"; u="search/find_me_worker?find=employee"},
            @{f="EC08_contractors-directory.html"; u="search/find_me_worker?search=worker"},
            @{f="EC09_jobs-board.html"; u="search/find_me_work?search=work"},
            @{f="EC10_job-detail.html"; u="search/work/780"},
            @{f="EC11_job-detail-quote.html"; u="search/work/780?quote=1"},
            @{f="EC12_create-job.html"; u="myaccount/create_job"},
            @{f="EC13_quick-job.html"; u="myaccount/create_quick_job"}
          )
          foreach($p in $pages){
            $url = $L + $p.u
            try {
              $resp = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 30 -Headers @{ "User-Agent"="Mozilla/5.0" }
              $html = $resp.Content
              if($html -notmatch '(?i)<base\s'){ $html = $html -replace '(?i)<head([^>]*)>', ('<head$1><base href="'+$L+'">') }
              [System.IO.File]::WriteAllText((Join-Path $dst $p.f), $html, (New-Object System.Text.UTF8Encoding($false)))
              Write-Output "  ✓ $($p.f)"
            } catch {
              Write-Output "  ✗ $($p.f) : $($_.Exception.Message)"
            }
          }

      - name: Record changes and commit
        shell: pwsh
        run: |
          git config user.name  'e-contract-refresh-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add pages-live/EC*.html
          $changed = @(git diff --cached --name-only | Where-Object { $_ -match '^pages-live/EC.+\.html$' })
          if ($changed.Count -eq 0) {
            Write-Host 'No page changes since yesterday.'
            exit 0
          }
          $date = (Get-Date).ToUniversalTime().AddHours(8).ToString('yyyy-MM-dd')
          Write-Host "Pages changed ($date): $($changed.Count)"
          git commit -m "chore: daily refresh of e-contract landing pages ($date)"
          git push

      - name: Deploy to Cloudflare Pages (econtract-review)
        shell: pwsh
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 14d2fb99ae902acf9ce452f2ee7671dc
        run: |
          npm install -g wrangler@4
          wrangler pages deploy pages-live --project-name=econtract-review --branch=production --commit-dirty=true
