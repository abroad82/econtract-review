name: Deploy e-contract review board (on push)

# Auto-deploys the e-contract Review Board to Cloudflare Pages whenever pages-live changes
# land on main. Uses the CLOUDFLARE_API_TOKEN secret already stored on this repo,
# so no one ever needs to paste a token locally. Also runnable on demand.
#
# Deploy-ONLY (no capture) — capture is handled by the daily refresh workflow.
# The repo is the source of truth: what's committed here is what goes live.

on:
  push:
    branches: [main]
    paths:
      - 'pages-live/**'
  workflow_dispatch: {}

# Avoid overlapping deploys racing each other
concurrency:
  group: deploy-workbench
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 14d2fb99ae902acf9ce452f2ee7671dc
        run: |
          npx --yes wrangler@4 pages deploy pages-live --project-name=econtract-review --branch=production --commit-dirty=true
