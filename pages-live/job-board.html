<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>e-contract Ã¢â‚¬â€ Job Board</title>
<style>
  :root{--red:#e8281e;--ink:#111827;--muted:#6b7280;--line:#e5e7eb}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:#f8fafc;line-height:1.4}
  header.top{background:var(--red);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:5}
  header.top h1{margin:0;font-size:18px;flex:1}
  header.top a,.flt button,#refresh{color:#fff;text-decoration:none;font-size:12.5px;font-weight:600;background:rgba(255,255,255,.16);padding:6px 11px;border-radius:7px;border:none;cursor:pointer}
  header.top a:hover{background:rgba(255,255,255,.28)}
  .flt{display:flex;gap:5px;align-items:center}
  .flt button.on{background:#fff;color:var(--red)}
  .meta{opacity:.9;font-size:12px;font-weight:400}
  .wrap{padding:16px 22px;max-width:1100px;margin:0 auto}
  .sec{margin:22px 0 8px;font-size:15px;font-weight:800;color:#374151;border-bottom:2px solid var(--line);padding-bottom:5px;display:flex;justify-content:space-between;align-items:baseline}
  .sec .n{font-size:12px;font-weight:600;color:var(--muted)}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:6px}
  td{padding:9px 11px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafafa}
  td.pri{width:42px}
  td.code{width:88px}
  td.ttl{font-weight:600}
  td.ttl .pg{font-weight:400;color:var(--muted);font-size:11.5px;margin-top:2px}
  td.stg{width:130px;text-align:right;white-space:nowrap}
  td.act{width:108px;text-align:right}
  .badge{font-size:.64rem;font-weight:800;padding:2px 7px;border-radius:999px;color:#fff;display:inline-block}
  .b-p1{background:#dc2626}.b-p2{background:#f59e0b}.b-p3{background:#94a3b8}
  .b-type{font-size:.6rem;background:#475569}.b-build{background:#0d9488}
  .codebadge{font-size:.7rem;font-weight:800;color:#fff;background:#334155;border-radius:5px;padding:2px 7px}
  .stage{font-size:.66rem;font-weight:800;padding:2px 9px;border-radius:999px;color:#fff}
  .s-todo{background:#64748b}.s-in_progress{background:#7c3aed}.s-ready{background:#d97706}
  .s-passed{background:#059669}.s-live{background:#2563eb}.s-deferred{background:#9ca3af}
  a.open{display:inline-block;background:#eef2f7;color:#334151;border:1px solid var(--line);text-decoration:none;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:6px}
  a.open:hover{background:#e2e8f0}
  #status{font-size:13px;color:var(--muted);padding:10px 0}
</style>
</head>
<body>
<header class="top">
  <h1>e-contract Ã¢â‚¬â€ Job Board <span id="total" class="meta"></span></h1>
  <span class="flt" id="flt"><span class="meta" style="margin-right:2px">Priority:</span>
    <button data-p="all" class="on">All</button><button data-p="P1">P1</button><button data-p="P2">P2</button><button data-p="P3">P3</button>
  </span>
  <span class="flt" id="fltS"><span class="meta" style="margin-right:2px">Status:</span>
    <button data-s="all" class="on">All</button><button data-s="todo">To Do</button><button data-s="in_progress">In Progress</button><button data-s="ready">Ready to Test</button><button data-s="passed">Passed</button><button data-s="live">Live</button><button data-s="deferred">Deferred</button>
  </span>
  <button id="refresh">Ã¢â€ Â» Refresh</button>
  <a href="index.html">Ã¢â€ Â Review Board</a>
  <a href="workbench.html">Workbench Ã¢â€ â€”</a>
</header>
<div class="wrap">
  <p id="status">Loading jobsÃ¢â‚¬Â¦</p>
  <div id="board"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="pages.js"></script>
<script>
(function(){
  var SB_URL="https://eqkwdhidstghlsdmipqq.supabase.co";
  var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxa3dkaGlkc3RnaGxzZG1pcHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTYwMzgsImV4cCI6MjA5Nzc3MjAzOH0.s1lozgGT0yJnFdZ88-hDotCi78U99CWF5MXjy3K_byQ";
  var sb=null; try{ sb=window.supabase.createClient(SB_URL,SB_KEY); }catch(e){}
  var STAGE_LABEL={todo:'To Do',in_progress:'In Progress',ready:'Ready to Test',passed:'Passed',live:'Live',deferred:'Deferred'};
  var STAGE_ORD={todo:0,in_progress:1,ready:2,passed:3,live:4,deferred:5};
  var PRI_ORD={P1:1,P2:2,P3:3};
  function esc(t){ var d=document.createElement('div'); d.textContent=t==null?'':t; return d.innerHTML; }
  function codeOf(p){ if(p.c) return p.c; if(p.f){var s=p.f.replace(/\.html?$/i,'');return s.indexOf('_')>=0?s.split('_')[0]:s;} return "Ã¢â‚¬â€"; }

  var pageMap={}, secOrder=[], filterP="all", filterS="all", allJobs=[];

  async function buildPageMap(){
    (window.WB_PAGES||[]).forEach(function(p){
      var id=p.f||("blank::"+p.g+"::"+p.n);
      pageMap[id]={code:codeOf(p),name:p.n,g:p.g};
      if(secOrder.indexOf(p.g)<0) secOrder.push(p.g);
    });
    if(sb){ try{
      var r=await sb.from('custom_pages').select('*');
      if(!r.error){ (r.data||[]).forEach(function(c){ var g=c.section||"8 Ã‚Â· New / Build"; pageMap[c.id]={code:c.code,name:c.name,g:g}; if(secOrder.indexOf(g)<0) secOrder.push(g); }); }
    }catch(e){} }
  }
  function localAllJobs(){
    var out=[]; try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(k.indexOf('wbv2_jobs_')===0){ try{ JSON.parse(localStorage.getItem(k)).forEach(function(j){ out.push(j); }); }catch(e){} } } }catch(e){} return out;
  }
  var VALID_STAGE={todo:1,in_progress:1,ready:1,passed:1,live:1,deferred:1};
  function jobFromRow(r){ var m={}; try{m=JSON.parse(r.message||'{}');}catch(e){} return {id:r.id,page_id:r.page_id,title:r.title||'',priority:r.priority||'P2',stage:(VALID_STAGE[r.status]?r.status:'todo'),type:m.type||'repair',action:m.action||'',expected:m.expected||'',actual:m.actual||''}; }
  async function loadJobs(){
    var byId={}; localAllJobs().forEach(function(j){ byId[j.id]=j; });
    if(sb){ try{ var r=await sb.from('notes').select('*'); if(!r.error){ (r.data||[]).forEach(function(x){ var m={}; try{m=JSON.parse(x.message||'{}');}catch(e){} if(m.kind==='comment') return; var j=jobFromRow(x); byId[j.id]=j; }); } }catch(e){} }
    return Object.keys(byId).map(function(k){ return byId[k]; });
  }

  function render(){
    var board=document.getElementById('board'), shown=0, html="";
    var jobs=allJobs.filter(function(j){
      var okP=(filterP==="all" || (j.priority||'P2')===filterP);
      var okS=(filterS==="all" || (j.stage||'todo')===filterS);
      return okP && okS;
    });
    // group jobs by the page's SECTION (same structure as everything else)
    var bySec={};
    jobs.forEach(function(j){ var g=(pageMap[j.page_id]&&pageMap[j.page_id].g)||"Other"; (bySec[g]=bySec[g]||[]).push(j); });
    var order=secOrder.slice(); Object.keys(bySec).forEach(function(g){ if(order.indexOf(g)<0) order.push(g); });

    order.forEach(function(g){
      var list=bySec[g]; if(!list||!list.length) return;
      // P1 at the top of the section, then P2, P3; then by stage
      list.sort(function(a,b){ var pa=PRI_ORD[a.priority||'P2']||2, pb=PRI_ORD[b.priority||'P2']||2; if(pa!==pb) return pa-pb;
        return (STAGE_ORD[a.stage||'todo']||0)-(STAGE_ORD[b.stage||'todo']||0); });
      shown+=list.length;
      html+='<div class="sec">'+esc(g)+'<span class="n">'+list.length+' job'+(list.length>1?'s':'')+'</span></div><table>';
      list.forEach(function(j){
        var pg=pageMap[j.page_id]||{code:'Ã¢â‚¬â€',name:j.page_id||''};
        var pri=(j.priority||'P2'), type=(j.type||'repair'), stg=(j.stage||'todo');
        html+='<tr>'+
          '<td class="pri"><span class="badge b-'+pri.toLowerCase()+'">'+esc(pri)+'</span></td>'+
          '<td class="code"><span class="codebadge">'+esc(pg.code)+'</span></td>'+
          '<td class="ttl">'+esc(j.title||'(untitled job)')+' <span class="badge b-'+(type==='build'?'build':'type')+'" style="margin-left:4px">'+(type==='build'?'BUILD':'REPAIR')+'</span>'+
            '<div class="pg">'+esc(pg.name)+'</div></td>'+
          '<td class="stg"><span class="stage s-'+stg+'">'+esc(STAGE_LABEL[stg]||stg)+'</span></td>'+
          '<td class="act"><a class="open" href="workbench.html?page='+encodeURIComponent(pg.code)+'">Open Ã¢â€ â€”</a></td>'+
        '</tr>';
      });
      html+='</table>';
    });
    board.innerHTML=html;
    document.getElementById('total').textContent="Ã‚Â· "+shown+" jobs";
    document.getElementById('status').textContent = !allJobs.length ? "No jobs yet Ã¢â‚¬â€ the team raises them in the Workbench (each page Ã¢â€ â€™ Jobs). They appear here automatically, grouped by section, P1 first."
      : (shown ? "" : "No jobs match these filters Ã¢â‚¬â€ try widening Priority or Status above.");
  }

  async function refresh(){ allJobs=await loadJobs(); render(); }
  document.getElementById('refresh').onclick=refresh;
  document.getElementById('flt').addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b)return;
    filterP=b.dataset.p; this.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b);}); render(); });
  document.getElementById('fltS').addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b)return;
    filterS=b.dataset.s; this.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b);}); render(); });

  (async function(){
    await buildPageMap();
    await refresh();
    if(sb){ try{ sb.channel('jb').on('postgres_changes',{event:'*',schema:'public',table:'notes'},refresh).subscribe(); }catch(e){} }
  })();
})();
</script>
</body>
</html>
